{{- if .Values.rbac.create -}}
---
# ClusterRole: minimum necessary permissions for kube-janitor.
# Read access to resources we scan; delete only what we can clean; write Events only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-janitor.fullname" . }}-manager-role
  labels:
    {{- include "kube-janitor.labels" . | nindent 4 }}
rules:
  # Core resource kinds kube-janitor can scan and clean.
  - apiGroups: [""]
    resources:
      - namespaces
      - configmaps
      - secrets
      - serviceaccounts
      - persistentvolumeclaims
      - services
    verbs: [get, list, watch, delete]
  # Pods and workloads are read-only (used for reference detection by resolvers).
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  # RBAC resources — list/watch to detect orphaned RoleBindings.
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [rolebindings, clusterrolebindings]
    verbs: [get, list, watch, delete]
  # Emit Kubernetes Events for findings and actions.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # JanitorPolicy CRDs.
  - apiGroups: [janitor.io]
    resources: [janitorpolicies]
    verbs: [get, list, watch]
  - apiGroups: [janitor.io]
    resources: [janitorpolicies/status]
    verbs: [get, update, patch]
  # Leader election (only needed when --leader-elect=true).
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-janitor.fullname" . }}-manager-rolebinding
  labels:
    {{- include "kube-janitor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-janitor.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-janitor.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
